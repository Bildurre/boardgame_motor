# CI del monorepo (Fase 7): las mismas puertas que en local —
# eslint + vue-tsc + build (frontend) y Pint + Pest (backend).
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: vue-tsc
        run: npm run type-check

      - name: Build (app + admin)
        run: npm run build

  backend:
    name: Backend (Pint + Pest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playground/api
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, sqlite3, gd, intl, zip
          coverage: none

      - name: Cache de Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('playground/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Instalar dependencias
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (api + core)
        run: |
          ./vendor/bin/pint --test
          ./vendor/bin/pint --test --config ../../packages/core/pint.json ../../packages/core

      - name: Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pest
        run: php artisan test
